<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login & Sign In Page</title>
  <link rel="stylesheet" href="login 1.css" />
</head>
<body>
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Contact Us</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <div class="logo-background">
      <img src="green living logo.jpg"alt="Green Living Logo" class="center-logo" />
    </div>
    <div class="forms-container">
      <div class="form-box">
        <h2>Login</h2>
        <div class="input-group">
          <label for="username">Username :</label>
          <input type="text" id="username" placeholder="Enter Username" />
        </div>
        <div class="input-group">
          <label for="password">Password :</label>
          <input type="password" id="password" placeholder="Enter Password" />
        </div>
        <button class="btn">Login</button>
        <p class="forgot">
          <a href="#">Forgot Password ?</a>
        </p>
        <p class="register">
          Don't have an account? <a href="#">Register here</a>
        </p>
        <div class="social-login">
          <p>Or Login with</p>
          <img src="google logo.png" alt="Google" />
          <img src="facebook logo.png" alt="Facebook" />
          <img src="linkedin logo.png" alt="linkedin" />
        </div>
      </div>
      <div class="form-box">
        <h2>Sign In</h2>
        <div class="input-group">
          <label for="email">E-mail Address</label>
          <input type="email" id="email" placeholder="Enter Email" />
        </div>
        <div class="input-group">
          <label for="pass">Password</label>
          <input type="password" id="pass" placeholder="Enter Password" />
        </div>
        <button class="btn">Continue</button>
        <p class="social-connect">or connect with Social Media</p>
        <button class="btn social-btn">Sign in web facebook</button>
      </div>
    </div>
  </main>
  <footer>
    <div class="footer-container">
      <div class="footer-section logo-section">
        <img src="green living logo.jpg" class="footer-logo" />
        <p>Green Living</p>
      </div>
      <div class="footer-section follow-us">
        <p>Follow Us</p>
        <img src="google logo.png" alt="Google" />
        <img src="facebook logo.png"alt="Facebook" />
        <img src="linkedin logo.png" alt="linkedin" />
        <p>Contact Us</p>
        <a href="mailto:abcpcr@gmail.com">abcpcr@gmail.com</a>
        <p>+91 1234567890</p>
      </div>
      <div class="footer-section footer-nav">
        <a href="#">HOME</a>
        <a href="#">JOURNEYS</a>
        <a href="#">GALLERIES</a>
        <a href="#">ABOUT</a>
        <a href="#">CONTACT</a>
      </div>
    </div>
  </footer>
</body>
</html>
